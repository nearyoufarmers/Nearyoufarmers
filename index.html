
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Near You Farmers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --green:#1B5E20;
    --light-green:#2e7d32;
    --gray:#f4f6f4;
    --dark:#121212;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    scroll-behavior:smooth;
}

body{
    color:#333;
    transition:0.4s;
}

.dark-mode{
    background:var(--dark);
    color:var(--white);
}

/* NAVBAR */
header{
    position:fixed;
    width:100%;
    top:0;
    background:white;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 15px rgba(0,0,0,0.05);
    z-index:1000;
}

.dark-mode header{
    background:#1e1e1e;
}

header img{
    width:60px;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:#333;
    font-weight:600;
}

.dark-mode nav a{
    color:white;
}

nav a:hover{
    color:var(--green);
}

.toggle{
    cursor:pointer;
    font-size:20px;
}

/* HERO */
.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url('background.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero-content img{
    width:140px;
    margin-bottom:20px;
}

.hero h1{
    font-size:55px;
}

.btn{
    background:var(--light-green);
    color:white;
    padding:14px 40px;
    border-radius:30px;
    text-decoration:none;
    display:inline-block;
    margin-top:25px;
}

/* SECTIONS */
section{
    padding:120px 8%;
}

.section-title{
    text-align:center;
    font-size:38px;
    color:var(--green);
    margin-bottom:50px;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-around;
    text-align:center;
}

.stat h2{
    font-size:50px;
    color:var(--green);
}

/* GALLERY */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.gallery-grid img{
    width:100%;
    border-radius:15px;
}

/* CONTACT FORM */
form{
    max-width:600px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:var(--green);
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* MAP */
.map{
    margin-top:50px;
}

/* FOOTER */
footer{
    background:var(--green);
    color:white;
    text-align:center;
    padding:40px 20px;
}

/* MOBILE */
@media(max-width:900px){
    .gallery-grid{
        grid-template-columns:1fr;
    }
    .stats{
        flex-direction:column;
        gap:30px;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png">
    <nav>
        <a href="#">Home</a>
        <a href="#stats">Impact</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>
    <div class="toggle" onclick="toggleDark()">🌙</div>
</header>

<div class="hero">
    <div class="hero-content">
        <img src="logo.png">
        <h1>Near You Farmers</h1>
        <p>Mechanized Farming for a Sustainable Future</p>
        <a href="#contact" class="btn">Work With Us</a>
    </div>
</div>

<section id="stats">
    <h2 class="section-title">Our Impact</h2>
    <div class="stats">
        <div class="stat">
            <h2 class="counter" data-target="150">0</h2>
            <p>Farmers Supported</p>
        </div>
        <div class="stat">
            <h2 class="counter" data-target="25">0</h2>
            <p>Projects Completed</p>
        </div>
        <div class="stat">
            <h2 class="counter" data-target="5">0</h2>
            <p>Years Experience</p>
        </div>
    </div>
</section>

<section id="gallery">
    <h2 class="section-title">Gallery</h2>
    <div class="gallery-grid">
        <img src="background.jpg">
        <img src="background.jpg">
        <img src="background.jpg">
    </div>
</section>

<section id="contact">
    <h2 class="section-title">Contact Us</h2>

    <form action="mailto:nearyoufarmers@gmail.com" method="POST" enctype="text/plain">
        <input type="text" name="Name" placeholder="Your Name" required>
        <input type="email" name="Email" placeholder="Your Email" required>
        <textarea name="Message" rows="5" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </form>

    <div class="map">
        <iframe 
        src="https://www.google.com/maps?q=Musanze,Rwanda&output=embed"
        width="100%" height="350" style="border:0;" allowfullscreen>
        </iframe>
    </div>
</section>

<footer>
    <p>📧 nearyoufarmers@gmail.com</p>
    <p>📍 Musanze, Rwanda</p>
    <p>© 2026 Near You Farmers</p>
</footer>

<script>
function toggleDark(){
    document.body.classList.toggle("dark-mode");
}

const counters = document.querySelectorAll('.counter');
counters.forEach(counter=>{
    const update = ()=>{
        const target = +counter.getAttribute('data-target');
        const count = +counter.innerText;
        const increment = target/100;

        if(count < target){
            counter.innerText = Math.ceil(count + increment);
            setTimeout(update, 20);
        } else{
            counter.innerText = target;
        }
    }
    update();
});
</script>

</body>
</html>
